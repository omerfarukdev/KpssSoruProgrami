<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KPSS Soru Programı</title>
<link rel="stylesheet" href="css/style.css?v=20260706a">
<!-- Ziyaret sayacı (GoatCounter — gizlilik dostu, kişisel veri toplamaz) -->
<script data-goatcounter="https://kpss-rafik.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div id="app"><div class="yukleniyor">Sorular yükleniyor…</div></div>
<script src="sorular/manifest.js?v=20260706a"></script>
<script src="js/app.js?v=20260706a"></script>
<script>
(function () {
  var files = window.KPSS_MANIFEST || [];
  var kalan = files.length;
  if (!kalan) { App.init(); return; }
  files.forEach(function (f) {
    var s = document.createElement("script");
    s.src = "sorular/" + f;
    s.onload = s.onerror = function () { if (--kalan === 0) App.init(); };
    document.head.appendChild(s);
  });
})();
</script>
</body>
</html>
